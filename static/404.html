<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      text-align: center;
    }

    .box {
      max-width: 500px;
    }

    h1 {
      font-size: 110px;
      color: #e2e8f0;
      margin: 0;
    }

    h2 {
      color: #1e293b;
      margin: 10px 0;
    }

    p {
      color: #64748b;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #3b82f6;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
